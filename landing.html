<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

  <title>梆了个梆</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --host-top: max(12px, var(--safe-top));
      --host-bottom: max(20px, var(--safe-bottom));
      --font-ui: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      --c-orange: #ff8a1a;
      --c-orange-dark: #c45a00;
      --c-floor: #cdcdc7;
      --c-floor-dark: #a7a59c;
      --c-wall: #2c5079;
      --c-wall-dark: #14223a;
      --c-red: #ea1731;
      --c-red-light: #ff798b;
      --c-green: #00e89a;
      --c-cream: #fff7d6;
      --c-yellow: #ffcc33;
      --outline: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 -1px 0 #000, 0 1px 0 #000, -1px 0 0 #000, 1px 0 0 #000;
      --outline-bold: -2px -2px 0 #000, -1px -2px 0 #000, 0 -2px 0 #000, 1px -2px 0 #000, 2px -2px 0 #000, -2px -1px 0 #000, 2px -1px 0 #000, -2px 0 0 #000, 2px 0 0 #000, -2px 1px 0 #000, 2px 1px 0 #000, -2px 2px 0 #000, -1px 2px 0 #000, 0 2px 0 #000, 1px 2px 0 #000, 2px 2px 0 #000, 0 3px 0 rgba(0,0,0,.55);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      position: fixed;
      inset: 0;
      font-family: var(--font-ui);
      font-synthesis: none;
      touch-action: manipulation;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      background: #14223a;
      color: #fff;
    }

    /* ─── 背景：俯视角竞技场（橙白条纹地板 + 远景蓝色机库墙） ─── */
    .cover {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      padding: var(--host-top) max(10px, var(--safe-right)) var(--host-bottom) max(10px, var(--safe-left));
      overflow: hidden;
      isolation: isolate;
    }

    /* 地板：背景图已包含场景，这里只保留一层柔和的暗角 + 出生圈 */
    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56%;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(0,0,0,.35) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .floor::after {
      /* 中央橙色出生圈 */
      content: "";
      position: absolute;
      left: 50%;
      top: 30%;
      width: 36%;
      aspect-ratio: 1 / 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 30%, var(--c-orange) 30% 32%, transparent 32% 46%, var(--c-orange) 46% 48%, transparent 48% 100%);
      opacity: .55;
      mix-blend-mode: screen;
    }

    /* 远景：游戏里那只猩猩/megachad 的剪影（CSS box 简化） */
    .arena-prop {
      position: absolute;
      right: 8%;
      top: 18%;
      width: clamp(32px, 9vw, 60px);
      height: clamp(56px, 15vw, 92px);
      z-index: 1;
      opacity: .65;
      background:
        linear-gradient(180deg, transparent 0 32%, #f1e4c8 32% 56%, #8c6b3f 56% 100%);
      border: 2px solid #000;
      border-radius: 24% 24% 14% 14%;
      filter: drop-shadow(2px 4px 0 rgba(0,0,0,.45));
      transform: rotate(-2deg);
    }

    .arena-prop::before {
      content: "";
      position: absolute;
      left: 22%;
      top: 14%;
      width: 56%;
      height: 18%;
      border-radius: 50%;
      background: #2b1d12;
      box-shadow:
        -28% 0 0 #2b1d12,
        28% 0 0 #2b1d12;
    }

    .cover-paused *,
    .cover-paused *::before,
    .cover-paused *::after { animation-play-state: paused !important; }

    /* ─── 顶部 HUD 行：HP pill / 计时 / 三个计数 / 暂停假按钮 ─── */
    .top-strip {
      position: absolute;
      top: var(--host-top);
      left: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: clamp(4px, 1.2vw, 8px);
      z-index: 6;
      pointer-events: none;
      flex-wrap: nowrap;
    }

    .hp-pill {
      position: relative;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px 4px 8px;
      border: 2.5px solid #000;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      box-shadow: 0 4px 0 rgba(0,0,0,.4);
    }

    .hp-pill .lv-badge {
      position: absolute;
      left: -2px;
      bottom: -10px;
      padding: 2px 6px;
      border: 2px solid #000;
      border-radius: 6px;
      background: linear-gradient(180deg, #ffcc33, #ff8a1a);
      color: #000;
      font-size: clamp(9px, 2.4vw, 11px);
      font-weight: 700;
      line-height: 1;
      text-shadow: none;
      box-shadow: 0 2px 0 rgba(0,0,0,.4);
    }

    .hp-pill .icon-heart {
      width: clamp(14px, 4vw, 18px);
      height: clamp(14px, 4vw, 18px);
      background:
        radial-gradient(circle at 30% 30%, var(--c-red-light) 0 28%, var(--c-red) 28% 70%, #6b0f0f 70% 100%);
      border: 1.5px solid #000;
      border-radius: 50% 50% 60% 60%;
      transform: rotate(-12deg);
    }

    .hp-pill .bar {
      position: relative;
      width: clamp(70px, 22vw, 110px);
      height: clamp(11px, 3vw, 14px);
      border: 2px solid #000;
      border-radius: 999px;
      background: #2a0608;
      overflow: hidden;
    }

    .hp-pill .bar > .fill {
      position: absolute;
      inset: 0;
      width: 65%;
      background: linear-gradient(180deg, var(--c-red-light), var(--c-red));
      box-shadow: 0 0 8px rgba(234,23,49,.7);
      transition: width .2s ease-out;
    }

    .hp-pill .hp-text {
      font-size: clamp(11px, 3.2vw, 14px);
      color: var(--c-cream);
      text-shadow: var(--outline);
      letter-spacing: .04em;
      line-height: 1;
    }

    .timer {
      flex: 1 1 auto;
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      color: #fff;
      line-height: 1;
      letter-spacing: .06em;
      text-shadow: var(--outline-bold);
      font-feature-settings: "tnum" 1;
    }

    .counters {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: clamp(4px, 1.4vw, 8px);
    }

    .difficulty-tag {
      padding: 3px 8px 4px;
      border: 2px solid #000;
      border-radius: 6px;
      background: linear-gradient(180deg, #ffcc33, #ff8a1a);
      color: #000;
      font-size: clamp(10px, 2.8vw, 12px);
      line-height: 1;
      font-weight: 700;
      text-shadow: none;
      box-shadow: 0 3px 0 rgba(0,0,0,.4);
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 7px 3px 4px;
      border: 2px solid #000;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: clamp(12px, 3.2vw, 14px);
      line-height: 1;
      text-shadow: var(--outline);
      box-shadow: 0 3px 0 rgba(0,0,0,.35);
    }

    .counter .dot {
      width: clamp(14px, 3.8vw, 18px);
      height: clamp(14px, 3.8vw, 18px);
      border: 1.5px solid #000;
      border-radius: 50%;
      background: var(--c-orange);
      display: grid;
      place-items: center;
      color: #000;
      font-size: .65em;
    }

    .counter .dot.silver { background: #cfcfcf; }
    .counter .dot.skull {
      background: #d6d6d6;
      position: relative;
    }
    .counter .dot.skull::before,
    .counter .dot.skull::after {
      content: "";
      position: absolute;
      top: 32%;
      width: 22%;
      height: 30%;
      background: #000;
      border-radius: 50%;
    }
    .counter .dot.skull::before { left: 22%; }
    .counter .dot.skull::after { right: 22%; }

    .pause-btn {
      flex: 0 0 auto;
      width: clamp(28px, 7.5vw, 36px);
      height: clamp(28px, 7.5vw, 36px);
      border: 2px solid #000;
      border-radius: 8px;
      background: rgba(0,0,0,.55);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: clamp(7px, 1.8vw, 9px);
      box-shadow: 0 4px 0 rgba(0,0,0,.4);
    }
    .pause-btn::before, .pause-btn::after {
      content: "";
      background: #fff;
      border-radius: 1px;
    }

    /* ─── 任务条（左侧丝带） ─── */
    .quest-ribbon {
      position: absolute;
      left: 8px;
      top: clamp(46px, 12vw, 64px);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 7px 10px;
      max-width: 72vw;
      border: 2.5px solid #000;
      border-radius: 6px 18px 18px 6px;
      background: linear-gradient(180deg, #1d2c4a, #0a1326);
      color: #fff;
      font-size: clamp(11px, 3.2vw, 14px);
      line-height: 1;
      text-shadow: var(--outline);
      box-shadow: 0 4px 0 rgba(0,0,0,.4);
      z-index: 6;
    }

    .quest-ribbon .quest-icon {
      flex: 0 0 auto;
      width: clamp(18px, 4.8vw, 22px);
      height: clamp(18px, 4.8vw, 22px);
      border: 2px solid #000;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 22%, var(--c-orange) 22% 30%, transparent 30% 48%, var(--c-orange) 48% 56%, transparent 56% 100%),
        #2a2a2a;
    }

    /* ─── 中央切片：玩家圆 + 周身怪潮 + 攻击范围 ─── */
    .slice {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(86vw, 460px);
      height: min(52vh, 400px);
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
    }

    .aim-range {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 68%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px dashed rgba(102,221,255,.55);
      box-shadow: 0 0 18px rgba(102,221,255,.35), inset 0 0 24px rgba(102,221,255,.18);
      animation: ring-spin 9s linear infinite;
    }

    .water-sweep {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 38%;
      aspect-ratio: 1 / 1;
      transform: translate(-90%, -10%) rotate(-30deg);
      border-radius: 50% 0 0 50% / 50% 0 0 50%;
      background: linear-gradient(180deg, rgba(102,221,255,.65), rgba(20,140,200,.05));
      filter: blur(1px);
      animation: water-pulse 1500ms ease-in-out infinite;
    }

    .player {
      position: absolute;
      left: 50%;
      top: 62%;
      width: clamp(36px, 10vw, 56px);
      height: clamp(36px, 10vw, 56px);
      border: 3px solid #000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 50% 35%, #fff 0 22%, #00e89a 22% 60%, #007a4d 60% 100%);
      box-shadow: 0 0 0 4px rgba(0,232,154,.25), 0 0 22px rgba(0,232,154,.75), 0 5px 0 rgba(0,0,0,.4);
      z-index: 4;
      animation: player-bob 780ms ease-in-out infinite;
    }

    .chad {
      position: absolute;
      left: 50%;
      top: 62%;
      width: clamp(120px, 32vw, 200px);
      height: auto;
      transform: translate(-50%, -78%);
      filter: drop-shadow(0 6px 0 rgba(0,0,0,.35)) drop-shadow(0 0 18px rgba(0,232,154,.5));
      z-index: 5;
      pointer-events: none;
      animation: chad-bob 1500ms ease-in-out infinite;
      -webkit-user-drag: none;
    }

    .player-shadow {
      width: clamp(50px, 13vw, 78px);
      height: clamp(14px, 3.6vw, 20px);
      border-radius: 50%;
      border: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.55) 0%, rgba(0,0,0,.25) 55%, transparent 75%);
      box-shadow: none;
      animation: shadow-pulse 1500ms ease-in-out infinite;
      z-index: 3;
    }

    .player-shadow::before, .player-shadow::after { display: none; }

    @keyframes chad-bob {
      0%, 100% { transform: translate(-50%, -78%) scale(1); }
      45%      { transform: translate(-50%, -84%) scale(1.04); }
    }

    @keyframes shadow-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .85; }
      45%      { transform: translate(-50%, -50%) scale(.82); opacity: .65; }
    }

    .player::before, .player::after {
      content: "";
      position: absolute;
      top: 36%;
      width: 18%;
      height: 22%;
      border-radius: 50%;
      background: #000;
    }
    .player::before { left: 24%; }
    .player::after { right: 24%; }

    .xp-gem {
      position: absolute;
      left: 50%;
      top: 62%;
      width: clamp(7px, 2vw, 11px);
      aspect-ratio: 1 / 1;
      border: 1.5px solid #000;
      background: linear-gradient(180deg, #b6ffd9, var(--c-green));
      box-shadow: 0 0 8px rgba(0,232,154,.8);
      transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) rotate(45deg);
      animation: gem-pull 2000ms ease-in-out infinite;
      animation-delay: var(--delay, 0ms);
    }

    .combo-peak {
      position: absolute;
      left: 50%;
      top: clamp(260px, 58vw, 340px);
      transform: translate(-50%, -50%);
      color: #ffefa0;
      font-size: clamp(24px, 7vw, 38px);
      font-weight: 800;
      letter-spacing: .04em;
      text-shadow:
        var(--outline-bold),
        0 0 22px rgba(255,204,51,.95),
        0 0 36px rgba(255,122,26,.7);
      animation: combo-punch 1500ms ease-in-out infinite;
      z-index: 6;
      pointer-events: none;
      white-space: nowrap;
    }

    .combo-peak small {
      display: block;
      margin-top: 4px;
      font-size: .42em;
      letter-spacing: .14em;
      color: var(--c-cream);
    }

    .damage-pop {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      color: var(--c-yellow);
      font-size: clamp(16px, 4.4vw, 24px);
      text-shadow: var(--outline-bold), 0 0 12px rgba(255,204,51,.95);
      animation: damage-pop 1500ms ease-out infinite;
      animation-delay: var(--delay, 0ms);
      z-index: 5;
      pointer-events: none;
    }

    /* ─── 底部 XP 通条 + 右下冲刺假按钮 ─── */
    .xp-bottom {
      position: absolute;
      left: 10px;
      right: clamp(70px, 18vw, 96px);
      bottom: var(--host-bottom);
      z-index: 6;
      pointer-events: none;
    }

    .xp-bottom .xp-bar {
      position: relative;
      width: 100%;
      height: clamp(18px, 5vw, 24px);
      border: 3px solid #000;
      border-radius: 999px;
      background: #1a1a1a;
      overflow: hidden;
      box-shadow: 0 4px 0 rgba(0,0,0,.4);
    }

    .xp-bottom .xp-bar > .fill {
      position: absolute;
      inset: 0;
      width: var(--xp, 78%);
      background: linear-gradient(180deg, #c9ffe8, var(--c-green));
      box-shadow: 0 0 16px rgba(0,232,154,.8), inset 0 1px 0 rgba(255,255,255,.4);
      transition: width .22s ease-out;
    }

    .xp-bottom .xp-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: clamp(11px, 3vw, 14px);
      line-height: 1;
      letter-spacing: .04em;
      text-shadow: var(--outline-bold);
    }

    .xp-bottom .avatar {
      position: absolute;
      left: -2px;
      bottom: -4px;
      width: clamp(36px, 10vw, 50px);
      height: clamp(36px, 10vw, 50px);
      border: 3px solid #000;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #fff 0 22%, var(--c-orange) 22% 50%, var(--c-orange-dark) 50% 100%);
      box-shadow: 0 4px 0 rgba(0,0,0,.4);
    }

    .dash-btn {
      position: absolute;
      right: clamp(10px, 3vw, 16px);
      bottom: clamp(50px, 14vw, 86px);
      width: clamp(54px, 14vw, 78px);
      height: clamp(54px, 14vw, 78px);
      border: 3px solid #000;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 28%, #fff8b5 0 14%, var(--c-orange) 14% 70%, var(--c-orange-dark) 70% 100%);
      box-shadow: 0 6px 0 rgba(0,0,0,.45), 0 0 22px rgba(255,138,26,.55);
      display: grid;
      place-items: center;
      z-index: 6;
      pointer-events: none;
      animation: dash-pulse 1500ms ease-in-out infinite;
    }

    .dash-btn::before {
      content: "";
      width: 50%;
      height: 50%;
      background:
        radial-gradient(circle at 50% 30%, #fff 0 18%, #2b1d12 18% 100%);
      clip-path: polygon(50% 0, 70% 30%, 100% 30%, 78% 52%, 92% 100%, 50% 78%, 8% 100%, 22% 52%, 0 30%, 30% 30%);
      transform: rotate(-12deg);
      filter: drop-shadow(0 2px 0 rgba(0,0,0,.5));
    }

    /* ─── 标题与 hook：盖在 HUD 之上但留出顶 strip 高度 ─── */
    .title-block {
      position: absolute;
      left: 50%;
      top: clamp(86px, 22vw, 116px);
      width: min(94vw, 540px);
      transform: translateX(-50%);
      text-align: center;
      z-index: 7;
      pointer-events: none;
    }

    .title {
      margin: 0;
      font-size: clamp(36px, 12vw, 64px);
      line-height: .88;
      letter-spacing: .04em;
      color: var(--c-cream);
      text-shadow:
        var(--outline-bold),
        0 0 18px rgba(255,204,51,.95),
        0 0 36px rgba(255,102,0,.75);
      transform: rotate(-2deg);
    }

    .title-logo {
      display: block;
      width: min(62vw, 280px);
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,.45)) drop-shadow(0 0 14px rgba(255,204,51,.5));
      transform: rotate(-2deg);
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .hook {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      margin-top: clamp(6px, 1.7vw, 10px);
      padding: 4px clamp(12px, 4vw, 18px) 5px;
      border: 2px solid #000;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffcc33 0%, #ff7a1a 100%);
      color: #fff;
      font-size: clamp(13px, 3.6vw, 18px);
      line-height: 1;
      text-shadow: var(--outline);
      box-shadow: 0 5px 0 rgba(0,0,0,.4), 0 0 18px rgba(255,122,26,.55);
      transform: rotate(1deg);
    }

    /* ─── animations ─── */
    @keyframes player-bob {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      45% { transform: translate(-50%, -56%) scale(1.05); }
    }

    @keyframes ring-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    @keyframes water-pulse {
      0%, 100% { opacity: .35; transform: translate(-90%, -10%) rotate(-30deg) scale(.9); }
      50% { opacity: .8; transform: translate(-90%, -10%) rotate(-30deg) scale(1.06); }
    }

    @keyframes gem-pull {
      0%, 30% { opacity: 0; transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) rotate(45deg) scale(.5); }
      45%     { opacity: 1; }
      100%    { opacity: .9; transform: translate(-50%, -50%) translate(0, 0) rotate(405deg) scale(.7); }
    }

    @keyframes damage-pop {
      0%, 34% { opacity: 0; transform: translate(-50%, -10%) scale(.5); }
      42%     { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
      70%     { opacity: 1; }
      100%    { opacity: 0; transform: translate(-50%, -120%) scale(.85); }
    }

    @keyframes combo-punch {
      0%, 31%, 100% { opacity: .7; transform: translate(-50%, -50%) scale(.86) rotate(-2deg); }
      42%           { opacity: 1; transform: translate(-50%, -50%) scale(1.18) rotate(2deg); }
      56%           { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    @keyframes dash-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 6px 0 rgba(0,0,0,.45), 0 0 16px rgba(255,138,26,.55); }
      50%      { transform: scale(1.05); box-shadow: 0 6px 0 rgba(0,0,0,.45), 0 0 26px rgba(255,138,26,.85); }
    }

    @media (max-width: 420px) {
      .title-logo { width: min(58vw, 240px); }
      .combo-peak { top: clamp(240px, 56vw, 320px); }
    }

    @media (max-height: 720px) {
      .title-block { top: clamp(74px, 20vw, 100px); }
      .title-logo { width: min(54vw, 220px); }
      .arena-prop { display: none; }
      .slice { top: 60%; }
    }

    @media (max-height: 600px) {
      .hook { display: none; }
      .title { font-size: clamp(28px, 9vw, 44px); }
      .title-block { top: clamp(60px, 16vw, 80px); }
      .combo-peak { display: none; }
    }
  </style>
</head>
<body>
  <main class="cover cover-paused" aria-label="梆了个梆游戏预览封面">
    <div class="bg"></div>
    <div class="floor"></div>
    <div class="arena-prop"></div>

    <header class="top-strip">
      <div class="hp-pill">
        <span class="icon-heart"></span>
        <div class="bar"><div class="fill" id="hpFill"></div></div>
        <span class="hp-text" id="hpText">65/100</span>
        <span class="lv-badge">Lv.1</span>
      </div>
      <div class="timer" id="timerText">00:24</div>
      <div class="counters">
        <span class="difficulty-tag">普通 I</span>
        <span class="counter"><span class="dot">😀</span><span id="killText">47</span></span>
        <span class="counter"><span class="dot silver"></span><span id="silverText">0</span></span>
        <span class="counter"><span class="dot skull"></span><span id="bossText">22</span></span>
      </div>
      <div class="pause-btn"></div>
    </header>

    <div class="quest-ribbon">
      <span class="quest-icon"></span>
      找到飞碟，召唤并击败BOSS！

      const timerText = document.getElementById("timerText");
      const killText = document.getElementById("killText");
      const silverText = document.getElementById("silverText");
      const bossText = document.getElementById("bossText");
      const comboText = document.getElementById("comboText");
      const xpFill = document.getElementById("xpFill");
      const xpText = document.getElementById("xpText");

      let raf = 0;
      let active = false;
      let visible = document.visibilityState === "visible";
      let intersecting = true;
      let loopStart = 0;
      let frozenElapsed = 0;
      const loopMs = 5200;

      const clamp = (v) => Math.max(0, Math.min(100, v));
      const pad = (n, w) => n.toString().padStart(w, "0");

      function render(now) {
        const elapsed = (now - loopStart + frozenElapsed) % loopMs;
        const t = elapsed / loopMs;
        const peak = t > .34 && t < .58 ? 1 : 0;

        const hp = clamp(65 - Math.max(0, Math.sin(t * Math.PI * 2)) * 8 + (peak ? -4 : 0));
        const xp = clamp(58 + t * 28 + (peak ? 5 : 0));
        const combo = 17 + Math.floor(t * 18) + (peak ? 11 : 0);
        const kills = 47 + Math.floor(t * 9) + (peak ? 3 : 0);
        const silver = peak ? 2 : 0;
        const bossKills = 22;
        const wave = 24 + Math.floor(t * 8);

        hpFill.style.width = hp + "%";
        hpText.textContent = `${Math.round(hp)}/100`;
        xpFill.style.width = xp + "%";
        xpText.textContent = xp >= 100 ? "LEVEL UP!" : `Lv.1 · ${Math.round(xp)}%`;
        comboText.textContent = `连击 x${combo}`;
        killText.textContent = kills.toString();
        silverText.textContent = silver.toString();
        bossText.textContent = bossKills.toString();
        timerText.textContent = `00:${pad(wave, 2)}`;

        if (active) raf = requestAnimationFrame(render);
      }

      function shouldPlay() {
        const r = cover.getBoundingClientRect();
        return visible && intersecting && r.width > 0 && r.height > 0;
      }

      window.setCoverPlaying = function (next) {
        if (next === active) return;
        active = next;
        cover.classList.toggle("cover-paused", !active);
        if (active) {
          loopStart = performance.now();
          raf = requestAnimationFrame(render);
        } else {
          if (raf) cancelAnimationFrame(raf);
          raf = 0;
          frozenElapsed = (performance.now() - loopStart + frozenElapsed) % loopMs;
        }
      };

      const sync = () => window.setCoverPlaying(shouldPlay());

      document.addEventListener("visibilitychange", () => {
        visible = document.visibilityState === "visible";
        sync();
      });
      window.addEventListener("pagehide", () => { visible = false; sync(); });

      if ("IntersectionObserver" in window) {
        const io = new IntersectionObserver(
          (es) => { intersecting = es.some((e) => e.intersectionRatio > 0); sync(); },
          { threshold: 0 }
        );
        io.observe(document.documentElement);
      }

      if ("ResizeObserver" in window) {
        const ro = new ResizeObserver(sync);
        ro.observe(document.documentElement);
      }

      sync();
    })();
  </script>
</body>
</html>
